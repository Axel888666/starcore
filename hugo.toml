[params]
# 基本参数
description = "星核动力科技是专业的大数据基础软件平台提供商，提供企业级Hadoop、Spark、Kafka等大数据解决方案，支持金融、能源、通信等行业数字化转型"
author = "星核动力科技（深圳）有限公司"

# SEO优化
keywords = "大数据平台,Hadoop,Spark,企业大数据解决方案,数据分析,商业智能,BI,数据仓库,实时计算,数据治理,星核动力,Redoop,大数据管理,云计算,数据安全"
robots = "index,follow"

# Open Graph / 社交媒体分享
[params.og]
  siteName = "星核动力科技"
  locale = "zh_CN"
  type = "website"
  image = "images/logo.png"

# 分析工具 (可选配置)
# googleAnalytics = "G-XXXXXXXXXX"  # 替换为实际的Google Analytics ID
# baiduAnalytics = "xxxxxxxxxxxxxxxx"  # 替换为实际的百度统计ID

# 社交媒体
[params.social]
  email = "info@starkernal.com"
  phone = "+86 136 3293 3869"
  address = "深圳市宝安区松白路3000号北大科创园A1栋研发楼423"
  wechat = "星核动力科技"

# 公司信息
[params.company]
  name = "星核动力科技（深圳）有限公司"
  legalName = "星核动力科技（深圳）有限公司"
  foundingDate = "2018"
  logo = "images/logo.png"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = "github"
    [markup.goldmark.extensions]
      linkify = true
      strikethrough = true
      table = true
      taskList = true

# URL处理配置
canonifyURLs = true
relativeURLs = false

# 忽略警告
ignoreLogs = ['warning-partial-superfluous-prefix']

# 性能优化
[minify]
  disableCSS = false
  disableHTML = false
  disableJS = false
  disableJSON = false
  disableSVG = false
  disableXML = false

# 缓存配置
[caches]
  [caches.getjson]
    dir = ":cacheDir/:project"
    maxAge = "10m"
  [caches.getcsv]
    dir = ":cacheDir/:project"
    maxAge = "10m"
  [caches.images]
    dir = ":resourceDir/_gen"
    maxAge = "720h"
  [caches.assets]
    dir = ":resourceDir/_gen"
    maxAge = "720h"